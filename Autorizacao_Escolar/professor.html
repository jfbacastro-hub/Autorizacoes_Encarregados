<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Professor - EduConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="logo">
                <span>Portal da ESMA</span>
            </div>
        </header>

        <main class="main-content">
            <div class="card glass-effect">
                <div class="card-header">
                    <img src="logotipo_ESMA.webp" alt="Logotipo ESMA" style="height: 75px; margin-bottom: 1.5rem; object-fit: contain;">
                    <br>
                    <span class="badge" style="background:#fef3c7; color:#d97706;">Área Reservada a Professores</span>
                    <h1>Criar Nova Atividade</h1>
                    <p class="subtitle">Defina os detalhes da atividade para gerar o formulário de autorização a enviar aos Encarregados de Educação.</p>
                </div>

                <form id="teacherForm" class="auth-form">
                    <div class="form-group">
                        <label for="professorInput">Professor Responsável (Opcional)</label>
                        <input type="text" id="professorInput" placeholder="Ex: Prof. Maria Silva">
                    </div>

                    <div class="form-group">
                        <label for="atividadeInput">Nome da Atividade <span style="color:#ef4444">*</span></label>
                        <input type="text" id="atividadeInput" placeholder="Ex: Visita de Estudo ao Oceanário" required>
                    </div>

                    <div class="form-group">
                        <label for="localInput">Destino / Local (Opcional)</label>
                        <input type="text" id="localInput" placeholder="Ex: Oceanário de Lisboa">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="dataInicioInput">Início da Atividade (Opcional)</label>
                            <input type="datetime-local" id="dataInicioInput">
                        </div>
                        <div class="form-group">
                            <label for="dataFimInput">Fim da Atividade (Opcional)</label>
                            <input type="datetime-local" id="dataFimInput">
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 1rem;">
                        <label for="notasInput">Descritivo / Observações importantes (Opcional)</label>
                        <textarea id="notasInput" rows="3" placeholder="Ex: Os alunos devem levar farnel e roupa confortável." style="width: 100%; padding: 0.9rem 1.2rem; border: 1px solid var(--border-color); border-radius: 12px; font-family: inherit; font-size: 1rem; color: var(--text-main); background: white; resize: vertical;"></textarea>
                    </div>

                    <div class="divider"></div>

                    <button type="button" class="submit-btn" id="generateLinkBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        <span class="btn-text" id="generateLinkText">Concluir Introdução de Dados</span>
                    </button>

                    <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                        <button type="button" class="secondary-btn class-hidden" id="editDataBtn" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.5rem; border: 1px solid #cbd5e1; background: #f8fafc; color: #475569; padding: 0.75rem;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.66V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5.34"></path><polygon points="18 2 22 6 12 16 8 16 8 12 18 2"></polygon></svg>
                            <span style="font-weight: 500;">Corrigir Dados</span>
                        </button>
                        <button type="button" class="secondary-btn class-hidden" id="newActivityBtn" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.5rem; border: 1px solid #fecaca; background: #fff5f5; color: #ef4444; padding: 0.75rem;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            <span style="font-weight: 500;">Nova Atividade</span>
                        </button>
                        <button type="button" class="secondary-btn class-hidden" id="saveActivityBtn" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.5rem; border: 1px solid #c7d2fe; background: #eef2ff; color: #4338ca; padding: 0.75rem;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                            <span style="font-weight: 500;">Gravar Atividade</span>
                        </button>
                        <button type="button" class="secondary-btn" id="loadActivityBtn" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.5rem; border: 1px solid #a7f3d0; background: #f0fdf4; color: #059669; padding: 0.75rem;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><polyline points="9 14 12 11 15 14"></polyline></svg>
                            <span style="font-weight: 500;">Recuperar Atividade</span>
                        </button>
                        <!-- input oculto para abrir ficheiro -->
                        <input type="file" id="importFileInput" accept=".json" style="display:none;">
                    </div>

                    <div id="linkResult" class="form-group class-hidden" style="margin-top: 1.5rem; text-align: left;">
                        <label>Link Gerado e Partilha Rápida:</label>
                        <div style="display:flex; gap:0.5rem; margin-top: 0.5rem;">
                            <input type="text" id="finalUrl" readonly style="background:#f9fafb; color:#111827; flex-grow:1;">
                            <button type="button" id="copyBtn" class="secondary-btn" style="width: auto; padding: 0.5rem 1rem;">📝 Copiar</button>
                        </div>
                        <div style="display:flex; gap:0.5rem; margin-top: 0.75rem;">
                            <button type="button" id="whatsappBtn" class="secondary-btn" style="flex:1; background:#25D366; color:white; border:none; padding: 0.75rem;">📱 WhatsApp</button>
                            <button type="button" id="smsBtn" class="secondary-btn" style="flex:1; background:#3b82f6; color:white; border:none; padding: 0.75rem;">💬 SMS</button>
                        </div>
                    </div>
                </form>

                <div class="divider"></div>
                
                <div class="dashboard-section" style="margin-top:2rem;">
                    <div id="printHeader" class="print-only" style="margin-bottom: 2rem; border-bottom: 2px solid #333; padding-bottom: 1rem;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                            <div>
                                <h1 id="printActivityTitle" style="margin: 0; color: #000; font-size: 20pt; text-align: left;">-</h1>
                                <p id="printActivityMeta" style="margin: 5px 0 0 0; color: #444; font-size: 11pt;">-</p>
                            </div>
                            <img src="logotipo_ESMA.webp" alt="ESMA" style="height: 50px;">
                        </div>
                    </div>

                    <div id="dashboardControls" style="display:flex; justify-content:space-between; align-items:center;">
                        <h2>Autorizações Recebidas</h2>
                        <div style="display: flex; gap: 0.5rem;">
                            <button type="button" class="secondary-btn" id="printPdfBtn" style="width:auto; padding:0.5rem 1rem; font-size:0.85rem; background:var(--primary); color:white; border:none; box-shadow:0 4px 6px rgba(79,70,229,0.2);">🖨️ Exportar PDF</button>
                            <button type="button" class="secondary-btn" id="clearDataBtn" style="width:auto; padding:0.5rem 1rem; font-size:0.85rem; color:#ef4444; border:1px solid #fca5a5; background:transparent;">🗑️ Limpar</button>
                        </div>
                    </div>
                    <div style="overflow-x: auto; margin-top:1rem;">
                        <table class="premium-table">
                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Aluno</th>
                                    <th>Turma</th>
                                    <th>Encarregado</th>
                                    <th>Contacto</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            <tbody id="submissionsTableBody">
                                <!-- Preenchido com JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        function getFormData() {
            return {
                professor: document.getElementById('professorInput')?.value || '',
                atividade: document.getElementById('atividadeInput')?.value || '',
                local: document.getElementById('localInput')?.value || '',
                inicio: document.getElementById('dataInicioInput')?.value || '',
                fim: document.getElementById('dataFimInput')?.value || '',
                notas: document.getElementById('notasInput')?.value || ''
            };
        }

        function saveActivityState(isLocked) {
            const data = getFormData();
            data.locked = isLocked;
            localStorage.setItem('eduAuthCurrentActivity', JSON.stringify(data));
        }

        function buildLink(data) {
            let baseArr = window.location.href.split('?')[0].split('#')[0].split('/');
            baseArr[baseArr.length - 1] = 'index.html';
            const baseUrl = baseArr.join('/');

            const url = new URL(baseUrl);
            url.searchParams.set('atividade', data.atividade.trim());
            if(data.professor.trim()) url.searchParams.set('professor', data.professor.trim());
            if(data.local.trim()) url.searchParams.set('local', data.local.trim());
            if(data.inicio) url.searchParams.set('inicio', data.inicio);
            if(data.fim) url.searchParams.set('fim', data.fim);
            if(data.notas.trim()) url.searchParams.set('notas', data.notas.trim());
            return url.toString();
        }

        function setLockState(locked, urlString = '', activityData = null) {
            ['professorInput', 'atividadeInput', 'localInput', 'dataInicioInput', 'dataFimInput', 'notasInput'].forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.disabled = locked;
                    el.style.opacity = locked ? '0.7' : '1';
                    el.style.background = locked ? '#f1f5f9' : 'white';
                }
            });

            const btn = document.getElementById('generateLinkBtn');
            btn.style.backgroundColor = locked ? '#10b981' : '';
            btn.style.cursor = locked ? 'default' : 'pointer';
            document.getElementById('generateLinkText').innerHTML = locked ? '<strong>Aprovado e Validado!</strong> O formulário abaixo está pronto.' : 'Concluir Introdução de Dados';
            btn.disabled = locked;

            if (locked) {
                document.getElementById('editDataBtn').classList.remove('class-hidden');
                document.getElementById('newActivityBtn').classList.remove('class-hidden');
                document.getElementById('saveActivityBtn').classList.remove('class-hidden');
                
                document.getElementById('finalUrl').value = urlString;
                document.getElementById('linkResult').classList.remove('class-hidden');
                
                let descAtividade = "nossa próxima atividade escolar";
                if (activityData) {
                    const nome = activityData.atividade || "";
                    let infoData = "";
                    if (activityData.inicio) {
                        const d = activityData.inicio.split('T')[0].split('-').reverse().join('/');
                        infoData = ` no dia ${d}`;
                    }
                    if (nome) descAtividade = `atividade "${nome}"${infoData}`;
                }

                const text = `Olá! Clique neste link para assinar a autorização da ${descAtividade}: ${urlString}`;
                document.getElementById('whatsappBtn').href = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
                document.getElementById('smsBtn').href = `sms:?body=${encodeURIComponent(text)}`;
            } else {
                document.getElementById('linkResult').classList.add('class-hidden');
                document.getElementById('editDataBtn').classList.add('class-hidden');
                document.getElementById('newActivityBtn').classList.add('class-hidden');
                document.getElementById('saveActivityBtn').classList.add('class-hidden');
            }
        }

        document.getElementById('generateLinkBtn').addEventListener('click', () => {
            const data = getFormData();
            if(!data.atividade.trim()) {
                alert("O Nome da Atividade é de preenchimento obrigatório.");
                return;
            }
            saveActivityState(true);
            setLockState(true, buildLink(data), data);
        });

        document.getElementById('editDataBtn').addEventListener('click', () => {
            saveActivityState(false);
            setLockState(false);
        });

        document.getElementById('newActivityBtn').addEventListener('click', () => {
             if(confirm("Tem a certeza que deseja limpar os dados para configurar uma nova atividade? O link gerado para a atividade anterior continuará válido, mas este ecrã será reiniciado.")) {
                 
                 // Verificar se há dados na tabela
                 const submissions = JSON.parse(localStorage.getItem('eduAuthSubmissions')) || [];
                 if (submissions.length > 0) {
                     if (confirm("Deseja exportar e guardar os dados da atividade atual (PDF + Ficheiro de Recuperação) antes de a limpar?")) {
                         exportData();
                         printWithCustomTitle();
                         alert("Atenção: Os ficheiros foram gerados. Clique OK para concluir a limpeza dos dados da atividade anterior.");
                     }
                     // Apagar as autorizações antigas para iniciar a nova atividade
                     localStorage.removeItem('eduAuthSubmissions');
                     loadSubmissions();
                 }

                 localStorage.removeItem('eduAuthCurrentActivity');
                 document.getElementById('teacherForm').reset();
                 setLockState(false);
             }
        });

        // === EXPORTAÇÃO (Guardar ficheiro JSON) ===
        function exportData() {
            const activity = JSON.parse(localStorage.getItem('eduAuthCurrentActivity')) || {};
            const submissions = JSON.parse(localStorage.getItem('eduAuthSubmissions')) || [];
            const bundle = { version: 1, activity, submissions };

            const nome = activity.atividade || 'Atividade';
            let prefixoData = '';
            if (activity.inicio) {
                prefixoData = activity.inicio.split('T')[0].split('-').join('') + ' ';
            }
            const filename = `${prefixoData}${nome} - Autorizacoes.json`;

            const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        document.getElementById('saveActivityBtn').addEventListener('click', () => {
            exportData();
            // Dá um pequeno tempo antes de abrir o PDF para o browser não bloquear os popup/downloads
            setTimeout(() => {
                printWithCustomTitle();
            }, 600);
        });

        // === IMPORTAÇÃO (Recuperar ficheiro JSON) ===
        document.getElementById('loadActivityBtn').addEventListener('click', () => {
            document.getElementById('importFileInput').click();
        });

        document.getElementById('importFileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const bundle = JSON.parse(ev.target.result);
                    if (!bundle.activity || !bundle.submissions) {
                        alert('Ficheiro inválido ou corrompido. Certifique-se de que é um ficheiro gerado por este sistema.');
                        return;
                    }

                    // Pergunta antes de sobrescrever
                    const currentSubs = JSON.parse(localStorage.getItem('eduAuthSubmissions')) || [];
                    if (currentSubs.length > 0) {
                        if (!confirm('Já existem dados nesta sessão. Deseja substituí-los pelos dados do ficheiro que está a abrir?')) {
                            e.target.value = '';
                            return;
                        }
                    }

                    // Preenche o formulario com os dados da atividade
                    const data = bundle.activity;
                    if(document.getElementById('professorInput')) document.getElementById('professorInput').value = data.professor || '';
                    if(document.getElementById('atividadeInput')) document.getElementById('atividadeInput').value = data.atividade || '';
                    if(document.getElementById('localInput')) document.getElementById('localInput').value = data.local || '';
                    if(document.getElementById('dataInicioInput')) document.getElementById('dataInicioInput').value = data.inicio || '';
                    if(document.getElementById('dataFimInput')) document.getElementById('dataFimInput').value = data.fim || '';
                    if(document.getElementById('notasInput')) document.getElementById('notasInput').value = data.notas || '';

                    // Guarda em localStorage e atualiza estado
                    data.locked = true;
                    localStorage.setItem('eduAuthCurrentActivity', JSON.stringify(data));
                    localStorage.setItem('eduAuthSubmissions', JSON.stringify(bundle.submissions));

                    setLockState(true, buildLink(data), data);
                    loadSubmissions();

                    alert(`✅ Atividade "${data.atividade}" recuperada com sucesso! ${bundle.submissions.length} autorização(s) carregada(s).`);
                } catch(err) {
                    alert('Erro ao ler o ficheiro. Verifique se é um ficheiro JSON válido.');
                }
                // Reset input para permitir reabrir o mesmo ficheiro se necessário
                e.target.value = '';
            };
            reader.readAsText(file);
        });

        // Initialize from local storage or set defaults on boot
        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('eduAuthCurrentActivity');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if(document.getElementById('professorInput')) document.getElementById('professorInput').value = data.professor || '';
                    if(document.getElementById('atividadeInput')) document.getElementById('atividadeInput').value = data.atividade || '';
                    if(document.getElementById('localInput')) document.getElementById('localInput').value = data.local || '';
                    if(document.getElementById('dataInicioInput')) document.getElementById('dataInicioInput').value = data.inicio || '';
                    if(document.getElementById('dataFimInput')) document.getElementById('dataFimInput').value = data.fim || '';
                    if(document.getElementById('notasInput')) document.getElementById('notasInput').value = data.notas || '';

                    if (data.locked) {
                        setLockState(true, buildLink(data), data);
                    }
                } catch(e) { console.error("Error loading activity state", e); }
            }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            const finalUrl = document.getElementById('finalUrl');
            finalUrl.select();
            document.execCommand('copy');
            
            const copyBtn = document.getElementById('copyBtn');
            const origText = copyBtn.textContent;
            copyBtn.textContent = 'Copiado!';
            setTimeout(() => {
                copyBtn.textContent = origText;
            }, 2000);
        });

        document.getElementById('whatsappBtn').addEventListener('click', () => {
            const finalUrl = document.getElementById('finalUrl').value;
            const text = `Olá! Clique neste link para enviar a autorização da nossa próxima atividade escolar: ${finalUrl}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
        });

        document.getElementById('smsBtn').addEventListener('click', () => {
            const finalUrl = document.getElementById('finalUrl').value;
            const text = `Autorizacao Escolar: Assine a participacao na proxima atividade aqui: ${finalUrl}`;
            // Use ?body parameter since most modern phones support it natively. Note that some iOS prefer &body but ?body works via browser redirection fallback.
            window.open(`sms:?body=${encodeURIComponent(text)}`);
        });

        // Formata nomes: Primeiro I. I. Último
        function formatName(fullname) {
            if (!fullname) return "";
            const parts = fullname.trim().split(/\s+/);
            if (parts.length <= 2) return fullname;
            
            const first = parts[0];
            const last = parts[parts.length - 1];
            const initials = parts.slice(1, -1).map(p => {
                // Remove preposições comuns em português
                const lower = p.toLowerCase();
                if (['de', 'da', 'do', 'das', 'dos', 'e'].includes(lower)) return null;
                return p[0].toUpperCase() + ".";
            }).filter(i => i !== null).join(" ");
            
            return initials ? `${first} ${initials} ${last}` : `${first} ${last}`;
        }

        // Load Submissions Table
        function loadSubmissions() {
            const tbody = document.getElementById('submissionsTableBody');
            const submissions = JSON.parse(localStorage.getItem('eduAuthSubmissions')) || [];
            
            if(submissions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Sem dados de autorizações recebidas de momento.</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            // Ordem decrescente
            [...submissions].reverse().forEach(sub => {
                tbody.innerHTML += `
                    <tr>
                        <td>${sub.date}</td>
                        <td><strong>${formatName(sub.student)}</strong></td>
                        <td>${sub.class}</td>
                        <td>${formatName(sub.guardian)}</td>
                        <td>${sub.contact}</td>
                        <td><span class="status-badge">${sub.status}</span></td>
                    </tr>
                `;
            });
        }

        document.getElementById('clearDataBtn').addEventListener('click', () => {
            if(confirm('Tem a certeza que deseja apagar os dados visíveis?')) {
                localStorage.removeItem('eduAuthSubmissions');
                loadSubmissions();
            }
        });

        function printWithCustomTitle() {
            // Tenta obter os dados guardados em localStorage (ativos)
            const saved = localStorage.getItem('eduAuthCurrentActivity');
            let data = null;
            if (saved) {
                try { data = JSON.parse(saved); } catch(e) {}
            }
            
            // Se não houver dados guardados, tenta ler os campos do formulário (caso o professor esteja a preencher sem clicar em Concluir)
            if (!data) {
                data = getFormData();
            }

            let docName = "Autorizacoes_Atividade";
            let printTitle = "Lista de Autorizações";
            let printMeta = "Portal de Autorizações ESMA";

            if (data && data.atividade) {
                const nome = data.atividade;
                let prefixoData = "";
                let dataFormatada = "";
                
                if (data.inicio) {
                    const d = data.inicio.split('T')[0];
                    prefixoData = d.split('-').join('') + " ";
                    dataFormatada = d.split('-').reverse().join('/');
                }
                
                docName = `${prefixoData}${nome} - Autorizacoes`;
                printTitle = nome;
                printMeta = `Data: ${dataFormatada || 'N/D'} | Professor: ${data.professor || 'N/D'} | Local: ${data.local || 'N/D'}`;
            }
            
            document.getElementById('printActivityTitle').textContent = printTitle;
            document.getElementById('printActivityMeta').textContent = printMeta;

            const originalTitle = document.title;
            document.title = docName;
            window.print();
            
            setTimeout(() => {
                document.title = originalTitle;
            }, 1000);
        }

        document.getElementById('printPdfBtn').addEventListener('click', () => {
            printWithCustomTitle();
        });

        loadSubmissions();
    </script>
</body>
</html>
